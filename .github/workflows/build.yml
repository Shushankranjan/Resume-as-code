name: Build Resume PDF

on:
  push:
    branch:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate PDF
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const path = require('path');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.goto('file://' + path.resolve('resume.html'), { waitUntil: 'networkidle0' });
            await page.pdf({
              path: 'KumarShushankRanjan_Resume.pdf',
              format: 'A4',
              printBackground: true,
              margin: { top: '15mm', bottom: '15mm', left: '18mm', right: '18mm' }
            });
            await browser.close();
          })();
          "
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resume-${{ steps.date.outputs.date }}
          name: Resume — ${{ steps.date.outputs.date }}
          body: Auto-generated resume PDF from latest HTML source.
          files: KumarShushankRanjan_Resume.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
