name: Build Resume PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf xvfb

      - name: Convert Markdown to PDF
        run: |
          xvfb-run pandoc resume.md \
            --css style.css \
            --pdf-engine=wkhtmltopdf \
            -V margin-top=0 \
            -V margin-bottom=0 \
            -V margin-left=0 \
            -V margin-right=0 \
            --standalone \
            -o KumarShushankRanjan_Resume.pdf

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resume-${{ steps.date.outputs.date }}
          name: Resume — ${{ steps.date.outputs.date }}
          body: Auto-generated resume PDF from latest markdown source.
          files: KumarShushankRanjan_Resume.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
